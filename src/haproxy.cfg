global
    log stdout format raw local0
    maxconn 4096

    # I am running HAProxy on my OpenWRT router, change path if needed
    lua-load /root/haproxy/minecraft_prot.lua

defaults
    log global
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 1m
    timeout server 1m

frontend minecraft
    # Listen on both IPv6 and IPv4 on port 25565 (standard Minecraft Java port. change if conflicts with other services)
    bind :::25565 v6only
    bind 0.0.0.0:25565

    # Minecraft Java only listens on TCP
    mode tcp

    # Wait UP TO 500ms for data
    # This may not be necessary, because the lua file (minecraft.lua) already handles imcomplete handshakes
    tcp-request inspect-delay 500ms


    # Evaluate the Minecraft handshake using a sample fetch.
    # If the packet is incomplete, HAProxy will automatically wait up to inspect-delay.
    # If it evaluates and returns anything other than "allow" (or times out and returns nil), reject.
    tcp-request content reject if !{ lua.mc_analyze -m str allow }

    # if we reach this point:
    # - the handshake is complete
    # - the source IP is not blocked
    # - the hostname is allowed
    # so we can forward this to the backend
    default_backend velocity

# I am using Velocity as my Minecraft proxy
# 192.168.8.119:25565 is what it is listening on in my local network
# change if needed
backend velocity
    mode tcp
    server vel 192.168.8.119:25565 send-proxy check
    server motd_server 127.0.0.1:25566 backup